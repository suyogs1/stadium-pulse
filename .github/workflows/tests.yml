name: StadiumPulse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run test suite with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml
        
    - name: Check system stability
      if: success()
      run: echo "PASSED: All StadiumPulse agents are stable and ready for deployment."
      
    - name: Alert on failure
      if: failure()
      run: echo "CRITICAL: Agent logic regression detected. Review test logs immediately."
